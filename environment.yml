name: screws310
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # Bootstrap-only by design: every dependency of the spinescrews package is
  # declared in pyproject.toml and installed by `pip install -e .` — do not
  # duplicate package deps here.
  - pydicom  # for dicom_tools/burn_screw_endpoints.py, which runs outside the installed package
  - ipython  # developer REPL convenience
